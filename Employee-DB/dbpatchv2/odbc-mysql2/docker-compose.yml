version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: employeedb-mysql2
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_DATABASE: employeedb2
      MYSQL_USER: dbpatch
      MYSQL_PASSWORD: dbpatch123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword123"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
    name: employeedb_mysql2_data
